<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Stream Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; color: white; }
        header { background: #333; text-align: center; padding: 10px; font-size: 14px; font-weight: bold; }
        
        .input-area { background: #222; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #444; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; font-size: 14px; }
        button { padding: 10px; border: none; border-radius: 4px; background: #007aff; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        
        /* 統合された1つのタイムライン */
        .chat-timeline { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #111; }
        .comment-row { font-size: 14px; line-height: 1.4; word-break: break-all; animation: fadeIn 0.2s ease-out; }
        .badge { margin-right: 4px; }
        .user-name { font-weight: bold; color: #aaa; margin-right: 6px; }
        .twitch-user { color: #a970ff; }
        .youtube-user { color: #ff4a4a; }
        .comment-text { color: #fff; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>統合コメントビューア</header>

    <div class="input-area">
        <input type="text" id="twitchInput" placeholder="Twitch チャンネル名 (例: fps_shaka)">
        <input type="text" id="youtubeInput" placeholder="YouTube 配信URL または 動画ID">
        <button onclick="connectStreams()">配信に接続</button>
    </div>

    <div class="chat-timeline" id="chatTimeline"></div>

    <script>
        // 【ここを自分のRenderのURLに書き換える】
        const SERVER_URL = "https://stream-comment-api.onrender.com"; 
        
        let socket = null;

        function connectStreams() {
            const twitchChannel = document.getElementById('twitchInput').value.trim();
            const youtubeInput = document.getElementById('youtubeInput').value.trim();
            
            if (!twitchChannel && !youtubeInput) return;

            // YouTubeのURLからIDを抽出
            let youtubeVideoId = youtubeInput;
            if (youtubeInput.includes('http')) {
                try {
                    const url = new URL(youtubeInput);
                    if (url.hostname.includes('youtube.com')) {
                        youtubeVideoId = url.searchParams.get('v');
                        if (!youtubeVideoId && url.pathname.startsWith('/live/')) {
                            youtubeVideoId = url.pathname.split('/')[2];
                        }
                    } else if (url.hostname === 'youtu.be') {
                        youtubeVideoId = url.pathname.split('/')[1];
                    }
                } catch (e) {
                    youtubeVideoId = youtubeInput;
                }
            }

            // チャット画面をリセット
            document.getElementById('chatTimeline').innerHTML = '';

            // 既存の接続があれば切断
            if (socket) socket.disconnect();

            // サーバーに接続
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                // サーバーに取得要求を送信
                socket.emit('start-stream', { twitchChannel, youtubeVideoId });
            });

            // サーバーからコメントを受信したときの処理
            socket.on('comment', (data) => {
                const timeline = document.getElementById('chatTimeline');
                
                const row = document.createElement('div');
                row.className = 'comment-row';
                
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.innerText = data.badge;
                
                const user = document.createElement('span');
                user.className = `user-name ${data.platform}-user`;
                user.innerText = data.user;
                
                const text = document.createElement('span');
                text.className = 'comment-text';
                text.innerText = data.text;
                
                row.appendChild(badge);
                row.appendChild(user);
                row.appendChild(text);
                
                timeline.appendChild(row);
                
                // 自動スクロール
                timeline.scrollTop = timeline.scrollHeight;
            });
        }
    </script>
</body>
</html>
